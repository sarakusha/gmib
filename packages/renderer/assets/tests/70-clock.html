<!DOCTYPE html>
<html lang="ru">

<head>
  <meta data-id="5568562c44a3583f1bf174ac">
  <meta charset="UTF-8">
  <title>Часы</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: grid;
      place-items: center;
      color: #fff;
      font-family: Roboto, Arial, Helvetica, sans-serif;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    #clock {
      width: 100%;
      padding: 0 0.08em;
      text-align: center;
      line-height: 1;
      white-space: nowrap;
      text-shadow:
        0 0.035em 0.09em rgba(0, 0, 0, 0.9),
        0 0 0.04em rgba(0, 0, 0, 0.9),
        0 0 0.18em rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body>
  <div id="clock">00:00:00</div>
  <script>
    const clock = document.getElementById('clock');
    const formatter = new Intl.DateTimeFormat('ru-RU', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
    });

    function updateFontSize() {
      const width = window.innerWidth || 1;
      const height = window.innerHeight || 1;
      clock.style.fontSize = `${Math.min(height * 0.78, width * 0.18)}px`;
    }

    function tick() {
      clock.textContent = formatter.format(new Date());
    }

    updateFontSize();
    tick();
    window.addEventListener('resize', updateFontSize);
    setInterval(tick, 250);
  </script>
</body>

</html>
