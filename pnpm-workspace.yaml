overrides:
  react: $react
  ws: $ws
  prettier: $prettier
  "@emotion/react": "11.14.0"
  "@emotion/styled": "11.14.0"
  "@emotion/cache": "11.14.0"
  # "@sarakusha/ebml": "file:.yalc/@sarakusha/ebml"
  # '@nibus/core': file:.yalc/@nibus/core
  # "@nibus/detection": file:.yalc/@nibus/detection
  # '@nibus/mibs': file:.yalc/@nibus/mibs
  # "@nibus/service": file:.yalc/@nibus/service
  # "@sarakusha/material-ui-chip-input": "file:.yalc/@sarakusha/material-ui-chip-input"

peerDependencyRules:
  allowedVersions:
    "@mui/material": "9"
    react-dom: "19"

# updateConfig:
#   ignoreDependencies:
#     - "@mui/icons-material"
#     - "@mui/lab"
#     - "@mui/material"
#     - "@mui/styled-engine"
#     - "@mui/system"
#     - "@mui/x-tree-view"

allowBuilds:
  "@serialport/bindings-cpp": true
  "@swc/core": true
  bufferutil: true
  core-js-pure: true
  electron: true
  electron-winstaller: true
  esbuild: true
  node-hid: true
  sqlite3: true
  usb: true
  utf-8-validate: true
minimumReleaseAgeExclude:
  - vite@8.0.13
  - "@nibus/*"
  - "@sarakusha/ebml@0.0.6"
  - "@sarakusha/material-ui-chip-input"
