name: Release
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build artifacts without uploading them to GitHub Release"
        default: true
        required: false
        type: boolean
      platforms:
        description: "Platforms to build"
        default: all
        required: false
        type: choice
        options:
          - all
          - macos
          - linux
          - windows
  workflow_call:
    inputs:
      dry-run:
        description: "Build artifacts without uploading them to GitHub Release"
        default: false
        required: false
        type: boolean
      platforms:
        description: "Platforms to build"
        default: all
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: "bash"

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release_check.outputs.release_id }}

    steps:
      - uses: actions/checkout@v6

      - name: Check draft release assets
        id: release_check
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const version = JSON.parse(
              fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, 'package.json'), 'utf8'),
            ).version;

            const { owner, repo } = context.repo;
            const releases = (await github.rest.repos.listReleases({ owner, repo, per_page: 100 })).data;
            let release = releases.find(
              candidate => candidate.draft && (candidate.tag_name === `v${version}` || candidate.tag_name === version),
            );

            if (!release) {
              try {
                release = (
                  await github.rest.repos.createRelease({
                    owner,
                    repo,
                    tag_name: `v${version}`,
                    target_commitish: context.sha,
                    name: `v${version}`,
                    draft: true,
                    prerelease: false,
                  })
                ).data;
              } catch (error) {
                if (error.status !== 422) throw error;

                const refreshed = (await github.rest.repos.listReleases({ owner, repo, per_page: 100 })).data;
                release = refreshed.find(
                  candidate => candidate.draft && (candidate.tag_name === `v${version}` || candidate.tag_name === version),
                );

                if (!release) {
                  throw error;
                }
              }
            }

            core.setOutput('release_id', String(release.id));

  draft_release:
    needs: prepare_release
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: macos
            arch: x64
            os: macos-15-intel
            builder_config: .electron-builder.config.js
            target_args:
              - -m
              - --x64
          - platform: macos
            arch: arm64
            os: macos-15
            builder_config: .electron-builder.config.js
            target_args:
              - -m
              - --arm64
          - platform: linux
            arch: x64
            os: ubuntu-22.04
            builder_config: .electron-builder-light.config.js
            target_args:
              - -l
              - --x64
          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            builder_config: .electron-builder-light.config.js
            target_args:
              - -l
              - --arm64
          - platform: windows
            arch: x64
            os: windows-latest
            builder_config: .electron-builder.config.js
            target_args:
              - -w
              - --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check platform selection
        id: platform_check
        run: |
          if [[ "${{ inputs.platforms }}" == "all" || "${{ inputs.platforms }}" == "${{ matrix.platform }}" ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: ${{ steps.platform_check.outputs.selected == 'true' }}

      - name: Check draft release assets
        id: release_check
        if: ${{ steps.platform_check.outputs.selected == 'true' }}
        uses: actions/github-script@v9
        env:
          BUILD_PLATFORM: ${{ matrix.platform }}
          BUILD_ARCH: ${{ matrix.arch }}
          RELEASE_ID: ${{ needs.prepare_release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const version = JSON.parse(
              fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, 'package.json'), 'utf8'),
            ).version;

            const expectedFilesByBuild = {
              'macos-x64': [
                `gmib-${version}.dmg`,
                `gmib-${version}.dmg.blockmap`,
                `gmib-${version}-mac.zip`,
                `gmib-${version}-mac.zip.blockmap`,
              ],
              'macos-arm64': [
                `gmib-${version}-arm64.dmg`,
                `gmib-${version}-arm64.dmg.blockmap`,
                `gmib-${version}-arm64-mac.zip`,
                `gmib-${version}-arm64-mac.zip.blockmap`,
              ],
              'linux-x64': [
                'gmib-x86_64.AppImage',
              ],
              'linux-arm64': [
                'gmib-arm64.AppImage',
              ],
              'windows-x64': [
                `gmib-setup-${version}.exe`,
                `gmib-setup-${version}.exe.blockmap`,
                'latest.yml',
              ],
            };

            const buildKey = `${process.env.BUILD_PLATFORM}-${process.env.BUILD_ARCH}`;
            const expectedFiles = expectedFilesByBuild[buildKey];
            if (!expectedFiles) {
              throw new Error(`Unknown build target: ${buildKey}`);
            }

            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const { data: release } = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId });

            const assetNames = new Set(release.assets.map(({ name }) => name));
            const missingExpectedFiles = expectedFiles.filter(name => !assetNames.has(name));

            if (missingExpectedFiles.length === 0) {
              core.notice(
                `All draft release assets already exist for ${process.env.BUILD_PLATFORM}: ${expectedFiles.join(', ')}`,
              );
              core.setOutput('skip_build', 'true');
            } else {
              core.notice(
                `Missing draft release assets for ${process.env.BUILD_PLATFORM}: ${missingExpectedFiles.join(', ')}`,
              );
              core.setOutput('skip_build', 'false');
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('expected_files', JSON.stringify(expectedFiles));

      - uses: pnpm/action-setup@v6
        if: ${{ steps.platform_check.outputs.selected == 'true' &&
          steps.release_check.outputs.skip_build != 'true' }}
        with:
          run_install: false

      - uses: actions/setup-node@v6
        if: ${{ steps.platform_check.outputs.selected == 'true' &&
          steps.release_check.outputs.skip_build != 'true' }}
        with:
          node-version: 24
          cache: "pnpm"

      - name: Write .env.local from secrets
        if: ${{ steps.platform_check.outputs.selected == 'true' &&
          steps.release_check.outputs.skip_build != 'true' }}
        env:
          VITE_ANNOUNCE_PROXY: ${{ secrets.VITE_ANNOUNCE_PROXY }}
          VITE_ANNOUNCE_PATH: ${{ secrets.VITE_ANNOUNCE_PATH }}
          VITE_ANNOUNCE_WINDOW: ${{ secrets.VITE_ANNOUNCE_WINDOW }}
          VITE_ANNOUNCE_BIND: ${{ secrets.VITE_ANNOUNCE_BIND }}
          VITE_ANNOUNCE_HOST: ${{ secrets.VITE_ANNOUNCE_HOST }}
          VITE_ANNOUNCE_NOVASTAR: ${{ secrets.VITE_ANNOUNCE_NOVASTAR }}
          VITE_ANNOUNCE_DATE: ${{ secrets.VITE_ANNOUNCE_DATE }}
          VITE_LICENSE_SERVER: ${{ secrets.VITE_LICENSE_SERVER }}
        run: |
          : "${VITE_ANNOUNCE_PROXY:?missing secret VITE_ANNOUNCE_PROXY}"
          : "${VITE_ANNOUNCE_PATH:?missing secret VITE_ANNOUNCE_PATH}"
          : "${VITE_ANNOUNCE_WINDOW:?missing secret VITE_ANNOUNCE_WINDOW}"
          : "${VITE_ANNOUNCE_BIND:?missing secret VITE_ANNOUNCE_BIND}"
          : "${VITE_ANNOUNCE_HOST:?missing secret VITE_ANNOUNCE_HOST}"
          : "${VITE_ANNOUNCE_NOVASTAR:?missing secret VITE_ANNOUNCE_NOVASTAR}"
          : "${VITE_ANNOUNCE_DATE:?missing secret VITE_ANNOUNCE_DATE}"
          : "${VITE_LICENSE_SERVER:?missing secret VITE_LICENSE_SERVER}"
          {
            printf '%s\n' "VITE_ANNOUNCE_PROXY=$VITE_ANNOUNCE_PROXY"
            printf '%s\n' "VITE_ANNOUNCE_PATH=$VITE_ANNOUNCE_PATH"
            printf '%s\n' "VITE_ANNOUNCE_WINDOW=$VITE_ANNOUNCE_WINDOW"
            printf '%s\n' "VITE_ANNOUNCE_BIND=$VITE_ANNOUNCE_BIND"
            printf '%s\n' "VITE_ANNOUNCE_HOST=$VITE_ANNOUNCE_HOST"
            printf '%s\n' "VITE_ANNOUNCE_NOVASTAR=$VITE_ANNOUNCE_NOVASTAR"
            printf '%s\n' "VITE_ANNOUNCE_DATE=$VITE_ANNOUNCE_DATE"
            printf '%s\n' "VITE_LICENSE_SERVER=$VITE_LICENSE_SERVER"
          } > .env.local

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.platform_check.outputs.selected == 'true' &&
          steps.release_check.outputs.skip_build != 'true' }}
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build sqlite3 from source for Linux
        if:
          ${{ steps.platform_check.outputs.selected == 'true' && matrix.platform == 'linux' &&
          steps.release_check.outputs.skip_build != 'true' }}
        run: |
          rm -f node_modules/sqlite3/build/Release/node_sqlite3.node
          node "$(node -e "console.log(require.resolve('node-gyp/bin/node-gyp.js', { paths: [require.resolve('sqlite3/package.json')] }))")" rebuild --directory node_modules/sqlite3
        env:
          npm_config_build_from_source: true

      - name: Import macOS code signing certificate
        if:
          ${{ steps.platform_check.outputs.selected == 'true' && matrix.platform == 'macos' &&
          steps.release_check.outputs.skip_build != 'true' }}
        env:
          MACOS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          MACOS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}
          GMIB_MAC_CODESIGN_IDENTITY:
            ${{ secrets.GMIB_MAC_CODESIGN_IDENTITY || 'gmib Self-Signed Code Signing' }}
        run: |
          : "${MACOS_CODESIGN_CERTIFICATE_BASE64:?missing secret MACOS_CODESIGN_CERTIFICATE_BASE64}"
          : "${MACOS_CODESIGN_CERTIFICATE_PASSWORD:?missing secret MACOS_CODESIGN_CERTIFICATE_PASSWORD}"
          : "${GMIB_MAC_CODESIGN_IDENTITY:?missing macOS code signing identity}"

          certificate_path="$RUNNER_TEMP/gmib-codesign.p12"
          certificate_pem_path="$RUNNER_TEMP/gmib-codesign.pem"
          keychain_path="$RUNNER_TEMP/gmib-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$MACOS_CODESIGN_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CODESIGN_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-certificate -c "$GMIB_MAC_CODESIGN_IDENTITY" -p "$keychain_path" > "$certificate_pem_path"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$certificate_pem_path"

          security find-identity -v -p codesigning "$keychain_path"
          if ! security find-identity -v -p codesigning "$keychain_path" | grep -F "$GMIB_MAC_CODESIGN_IDENTITY"; then
            echo "Cannot find macOS code signing identity: $GMIB_MAC_CODESIGN_IDENTITY" >&2
            exit 1
          fi

          {
            printf '%s\n' "CSC_NAME=$GMIB_MAC_CODESIGN_IDENTITY"
            printf '%s\n' "GMIB_MAC_CODESIGN_IDENTITY=$GMIB_MAC_CODESIGN_IDENTITY"
          } >> "$GITHUB_ENV"

      - name: Download FFmpeg for macOS
        if:
          ${{ steps.platform_check.outputs.selected == 'true' && matrix.platform == 'macos' &&
          steps.release_check.outputs.skip_build != 'true' }}
        run: |
          mkdir -p ffmpeg/darwin-x64 ffmpeg/darwin-arm64
          curl --fail --location --retry 5 \
            https://github.com/mifi/ffmpeg-build-script/releases/latest/download/ffmpeg-macos-X64 \
            --output ffmpeg/darwin-x64/ffmpeg
          curl --fail --location --retry 5 \
            https://github.com/mifi/ffmpeg-build-script/releases/latest/download/ffprobe-macos-X64 \
            --output ffmpeg/darwin-x64/ffprobe
          curl --fail --location --retry 5 \
            https://github.com/mifi/ffmpeg-build-script/releases/latest/download/ffmpeg-macos-ARM64 \
            --output ffmpeg/darwin-arm64/ffmpeg
          curl --fail --location --retry 5 \
            https://github.com/mifi/ffmpeg-build-script/releases/latest/download/ffprobe-macos-ARM64 \
            --output ffmpeg/darwin-arm64/ffprobe
          chmod +x ffmpeg/darwin-x64/ffmpeg ffmpeg/darwin-x64/ffprobe
          chmod +x ffmpeg/darwin-arm64/ffmpeg ffmpeg/darwin-arm64/ffprobe

      # - name: Download FFmpeg for Linux
      #   if:
      #     ${{ steps.platform_check.outputs.selected == 'true' && matrix.platform == 'linux' &&
      #     steps.release_check.outputs.skip_build != 'true' }}
      #   run: |
      #     mkdir -p ffmpeg/linux-x64 ffmpeg/linux-arm64
      #     curl --fail --location --retry 5 \
      #       https://github.com/mifi/ffmpeg-build-script/releases/latest/download/ffmpeg-linux-X64 \
      #       --output ffmpeg/linux-x64/ffmpeg
      #     curl --fail --location --retry 5 \
      #       https://github.com/mifi/ffmpeg-build-script/releases/latest/download/ffmpeg-linux-ARM64 \
      #       --output ffmpeg/linux-arm64/ffmpeg
      #     chmod +x ffmpeg/linux-x64/ffmpeg ffmpeg/linux-arm64/ffmpeg

      - name: Download FFmpeg for Windows
        if:
          ${{ steps.platform_check.outputs.selected == 'true' && matrix.platform == 'windows' &&
          steps.release_check.outputs.skip_build != 'true' }}
        run: |
          mkdir -p ffmpeg/win32-x64
          curl --fail --location --retry 5 \
            https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.7z \
            --output ffmpeg/win32-x64/ffmpeg.7z
          7z x ffmpeg/win32-x64/ffmpeg.7z -offmpeg/win32-x64/extracted
          mv ffmpeg/win32-x64/extracted/ffmpeg-*-essentials_build/bin/ffmpeg.exe ffmpeg/win32-x64/
          mv ffmpeg/win32-x64/extracted/ffmpeg-*-essentials_build/bin/ffprobe.exe ffmpeg/win32-x64/

      - run: pnpm run build
        if: ${{ steps.platform_check.outputs.selected == 'true' &&
          steps.release_check.outputs.skip_build != 'true' }}

      - name: Compile artifacts without publishing
        if: ${{ steps.platform_check.outputs.selected == 'true' &&
          steps.release_check.outputs.skip_build != 'true' }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 6
          retry_wait_seconds: 15
          retry_on: error
          shell: "bash"
          command: >-
            pnpm exec electron-builder --config ${{ matrix.builder_config }} ${{
            join(matrix.target_args, ' ') }} --publish never
          # GH_TOKEN: ${{ github.token }}

      - name: Verify macOS code signature
        if:
          ${{ steps.platform_check.outputs.selected == 'true' && matrix.platform == 'macos' &&
          steps.release_check.outputs.skip_build != 'true' }}
        run: |
          app_path="$(find dist -name 'gmib.app' -type d | head -n 1)"
          : "${app_path:?cannot find built gmib.app}"

          codesign -dv --verbose=4 "$app_path" 2>&1 | tee "$RUNNER_TEMP/gmib-codesign.log"
          codesign -d -r- "$app_path"
          codesign --verify --deep --strict --verbose=4 "$app_path"

          if grep -q 'Signature=adhoc' "$RUNNER_TEMP/gmib-codesign.log"; then
            echo "macOS app was signed ad-hoc; Squirrel.Mac auto-update will reject future releases." >&2
            exit 1
          fi

      - name: Upload missing release assets
        if: ${{ steps.platform_check.outputs.selected == 'true' &&
          steps.release_check.outputs.skip_build != 'true' && github.event_name !=
          'workflow_dispatch' }}
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ needs.prepare_release.outputs.release_id }}
          EXPECTED_FILES: ${{ steps.release_check.outputs.expected_files }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const expectedFiles = new Set(JSON.parse(process.env.EXPECTED_FILES));
            const { data: release } = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId });
            const assetNames = new Set(release.assets.map(({ name }) => name));

            const distDir = path.join(process.env.GITHUB_WORKSPACE, 'dist');
            const localAssets = fs
              .readdirSync(distDir, { withFileTypes: true })
              .filter(entry => entry.isFile())
              .map(entry => entry.name)
              .filter(name => expectedFiles.has(name) && !assetNames.has(name));

            if (localAssets.length === 0) {
              core.notice('No missing release assets to upload.');
              return;
            }

            for (const assetName of localAssets) {
              const assetPath = path.join(distDir, assetName);
              const data = fs.readFileSync(assetPath);

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: assetName,
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length,
                },
              });

              core.notice(`Uploaded ${assetName}`);
            }

  update_release_metadata:
    needs:
      - prepare_release
      - draft_release
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v6

      - name: Upload update metadata
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ needs.prepare_release.outputs.release_id }}
          BUILD_PLATFORMS: ${{ inputs.platforms }}
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            const path = require('path');

            const version = JSON.parse(
              fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, 'package.json'), 'utf8'),
            ).version;

            const selectedPlatforms = process.env.BUILD_PLATFORMS;
            const shouldPublishPlatform = platform => selectedPlatforms === 'all' || selectedPlatforms === platform;

            const metadataFiles = [];

            if (shouldPublishPlatform('macos')) {
              metadataFiles.push({
                name: 'latest-mac.yml',
                assets: [
                  `gmib-${version}-mac.zip`,
                  `gmib-${version}.dmg`,
                  `gmib-${version}-arm64-mac.zip`,
                  `gmib-${version}-arm64.dmg`,
                ],
              });
            }

            if (shouldPublishPlatform('linux')) {
              metadataFiles.push(
                {
                  name: 'latest-linux.yml',
                  assets: ['gmib-x86_64.AppImage'],
                },
                {
                  name: 'latest-linux-arm64.yml',
                  assets: ['gmib-arm64.AppImage'],
                },
              );
            }

            if (metadataFiles.length === 0) {
              core.notice('No update metadata needs to be generated for the selected platforms.');
              return;
            }

            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const { data: release } = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId });
            const assetsByName = new Map(release.assets.map(asset => [asset.name, asset]));

            const getAssetBytes = async asset => {
              const response = await github.request('GET /repos/{owner}/{repo}/releases/assets/{asset_id}', {
                owner,
                repo,
                asset_id: asset.id,
                headers: {
                  accept: 'application/octet-stream',
                },
              });

              return Buffer.isBuffer(response.data)
                ? response.data
                : Buffer.from(response.data);
            };

            const buildMetadata = async ({ assets }) => {
              const files = [];

              for (const assetName of assets) {
                const asset = assetsByName.get(assetName);

                if (!asset) {
                  throw new Error(`Cannot generate update metadata: missing release asset ${assetName}`);
                }

                const data = await getAssetBytes(asset);
                files.push({
                  url: asset.name,
                  sha512: crypto.createHash('sha512').update(data).digest('base64'),
                  size: asset.size,
                });
              }

              const primaryFile = files[0];
              const lines = [
                `version: ${version}`,
                'files:',
                ...files.flatMap(file => [
                  `  - url: ${file.url}`,
                  `    sha512: ${file.sha512}`,
                  `    size: ${file.size}`,
                ]),
                `path: ${primaryFile.url}`,
                `sha512: ${primaryFile.sha512}`,
                `releaseDate: '${new Date().toISOString()}'`,
                '',
              ];

              return Buffer.from(lines.join('\n'));
            };

            for (const metadataFile of metadataFiles) {
              const existingAsset = assetsByName.get(metadataFile.name);

              if (existingAsset) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existingAsset.id,
                });
              }

              const data = await buildMetadata(metadataFile);

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: metadataFile.name,
                data,
                headers: {
                  'content-type': 'text/yaml',
                  'content-length': data.length,
                },
              });

              core.notice(`Uploaded ${metadataFile.name}`);
            }
